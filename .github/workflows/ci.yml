name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No explicit version here: the action reads packageManager from
      # package.json, and specifying both makes it fail.
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test (vitest, includes property tests)
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint (eslint)
        run: pnpm lint

      - name: Build (tsup)
        run: pnpm build

      - name: Typecheck playground
        run: pnpm --filter playground exec tsc --noEmit

      - name: Build playground
        run: pnpm --filter playground build

      - name: Upload playground for Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: examples/playground/dist

  deploy-playground:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish:
    # Runs on every push to main and on manual dispatch, but only actually
    # publishes when package.json carries a version not yet on the registry
    # and the NPM_TOKEN secret is present. Otherwise it skips and stays green.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (tsup)
        run: pnpm build

      - name: Publish to npm when the version is new
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::notice::NPM_TOKEN secret is not set; skipping publish. Add an npm automation token as the NPM_TOKEN repository secret to enable CI publishing."
            exit 0
          fi
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "::notice::$NAME@$VERSION is already on the registry; nothing to publish."
            exit 0
          fi
          echo "Publishing $NAME@$VERSION"
          npm publish --provenance --access public --ignore-scripts
